<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mzw的网站</title>
    <style>
        /* 背景图适配 2560×1440 分辨率 */
        body {
            background-image: url("15.jpg");
            background-size: cover; /* 保持比例缩放覆盖全屏 */
            background-position: center; /* 居中显示 */
            background-repeat: no-repeat;
            min-height: 100vh; /* 覆盖整个视口高度 */
            padding: 20px;
            color: #fff; /* 文字白色更清晰 */
            text-shadow: 0 0 5px #000; /* 文字阴影增强对比度 */
        }
        /* 可选：给内容加半透明背景，提升可读性 */
        .content {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
        }
        a {
            color: #ffd700; /* 金色链接更醒目 */
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>欢迎来到mzw的网站！</h1>
        <p>这是一个简单的HTML页面，展示了基本的结构和内容。</p>
        <h2>关于我</h2>
        <!-- 添加 target="_blank" 新建窗口打开，rel 属性提升安全性 -->
        <a href="https://space.bilibili.com/600025325" target="_blank" rel="noopener noreferrer">点击这里访问我的个人主页</a>
        <br><br> <!-- 换行增加间距 -->
        <a href="https://www.shinnku.com/" target="_blank" rel="noopener noreferrer">点击这里访问真红小站</a>
        <h3>让和平永存</h3>
    </div>
    <!-- 若不需要直接显示图片，可删除以下 img 标签（背景图已设置） -->
    <!-- <img src="15.jpg"> -->
</body>
</html>
